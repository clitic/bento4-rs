name: ci

on:
  push:
    branches: "main"
  pull_request:
    branches: "main"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: Check formatting and lint
      run: cargo fmt --all -- --check && cargo clippy -- -D warnings
    - name: Test
      run: cargo test
